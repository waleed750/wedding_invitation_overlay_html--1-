name: Publish static site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to gh-pages branch
        shell: bash
        run: |
          set -euo pipefail

          export WORKTREE="$(mktemp -d)"
          cp index.html invitation.png README.md README.txt .nojekyll "$WORKTREE"/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git worktree add "$WORKTREE-branch" origin/gh-pages
            git -C "$WORKTREE-branch" rm -rf . >/dev/null 2>&1 || true
          else
            git worktree add --detach "$WORKTREE-branch"
            git -C "$WORKTREE-branch" checkout --orphan gh-pages
            git -C "$WORKTREE-branch" rm -rf . >/dev/null 2>&1 || true
          fi

          cp -R "$WORKTREE"/. "$WORKTREE-branch"/
          git -C "$WORKTREE-branch" add .
          git -C "$WORKTREE-branch" commit -m "Publish site" || exit 0
          git -C "$WORKTREE-branch" push origin HEAD:gh-pages
