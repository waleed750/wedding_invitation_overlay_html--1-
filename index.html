<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f1e7" />
  <title>دعوة حفل زفاف</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #ece3d1;
      --bg-2: #f8f4ec;
      --card: rgba(255,255,255,0.72);
      --gold: #b8892e;
      --gold-soft: #d9b868;
      --green: #0f4d40;
      --green-dark: #0b3c33;
      --text: #2b312f;
      --shadow: 0 24px 60px rgba(27, 33, 31, .14);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: 'Cairo', 'Amiri', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,.96), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 48%, #ece3d4);
    }

    body {
      display: flex;
      justify-content: center;
      padding: max(16px, env(safe-area-inset-top)) 16px max(28px, env(safe-area-inset-bottom));
    }

    .page {
      width: min(960px, 100%);
      animation: fadeUp .8s ease;
    }

    .hero-card {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.56));
      border: 1px solid rgba(184,137,46,.22);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.75);
      backdrop-filter: blur(8px);
      padding: 16px;
    }

    .invitation-shell {
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 16px 40px rgba(15, 55, 46, .12);
    }

    .invitation {
      width: 100%;
      display: block;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .overlay-zone {
      position: absolute;
      left: 50%;
      bottom: clamp(24px, 5vw, 46px);
      transform: translateX(-50%);
      width: min(82%, 430px);
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .overlay-button {
      pointer-events: auto;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 46px;
      padding: 9px 22px;
      border: 1px solid rgba(255,255,255,.45);
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(180deg, rgba(18,91,76,.94), rgba(11,60,51,.96));
      text-decoration: none;
      font-size: 16px;
      font-weight: 800;
      box-shadow:
        0 18px 34px rgba(11, 60, 51, .28),
        inset 0 1px 0 rgba(255,255,255,.12);
      overflow: hidden;
      transition: transform .22s ease, box-shadow .22s ease, filter .22s ease;
    }

    .overlay-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.10), transparent 42%);
      pointer-events: none;
    }

    .overlay-button::after {
      content: '';
      position: absolute;
      top: -40%;
      left: -35%;
      width: 26%;
      height: 180%;
      transform: rotate(24deg);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.34), transparent);
      animation: shine 4s ease-in-out infinite;
      pointer-events: none;
    }

    .overlay-button:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 22px 42px rgba(11, 60, 51, .34);
      filter: saturate(1.02);
    }

    .overlay-button:active { transform: translateY(0); }

    .pin {
      width: 17px;
      height: 17px;
      flex: 0 0 17px;
    }

    .overlay-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.1;
    }

    .overlay-text .main {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: .2px;
    }

    .overlay-text .sub {
      margin-top: 3px;
      font-size: 11px;
      font-weight: 600;
      opacity: .9;
    }

    .helper {
      text-align: center;
      padding: 18px 10px 6px;
      color: var(--green-dark);
      font-size: 15px;
    }

    .helper strong { color: var(--green); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shine {
      0%, 58% { left: -35%; opacity: 0; }
      66% { opacity: 1; }
      88%, 100% { left: 120%; opacity: 0; }
    }

    @media (max-width: 640px) {
      body { padding-inline: 10px; }
      .hero-card { padding: 10px; border-radius: 20px; }
      .invitation-shell { border-radius: 16px; }
      .overlay-zone {
        bottom: clamp(4px, 1.0vw, 8px);
        width: min(88%, 360px);
      }
      .overlay-button {
        min-height: 38px;
        padding: 7px 16px;
        gap: 6px;
      }
      .pin { width: 14px; height: 14px; flex: 0 0 14px; }
      .overlay-text .main { font-size: 14px; }
      .overlay-text .sub { font-size: 9.5px; margin-top: 2px; }
      .helper { font-size: 14px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero-card">
      <div class="invitation-shell">
        <img class="invitation" src="invitation.png" alt="دعوة حفل زفاف" />

        <div class="overlay-zone">
          <a id="smartMapButton" class="overlay-button" href="#" aria-label="اضغط هنا لفتح الموقع على الخرائط">
            <svg class="pin" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 21s6-5.1 6-11a6 6 0 1 0-12 0c0 5.9 6 11 6 11Z" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="12" cy="10" r="2.3" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <span class="overlay-text">
              <span class="main">اضغط هنا</span>
              <span class="sub">لفتح موقع المناسبة</span>
            </span>
          </a>
        </div>
      </div>

      <div class="helper"><strong>ملاحظة:</strong> سيتم فتح الخرائط المناسبة لجهازك مباشرة.</div>
    </section>
  </main>

  <script>
    (function () {
      const googleMapsUrl = 'https://maps.app.goo.gl/HBEgUZ6yxENdvdgr7?g_st=iw';
      const appleMapsUrl = 'https://maps.apple.com/?q=' + encodeURIComponent('InterContinental Citystars Cairo by IHG') + '&ll=30.0737,31.3460';
      const btn = document.getElementById('smartMapButton');
      const ua = navigator.userAgent || navigator.vendor || window.opera || '';
      const isApple = /iPhone|iPad|iPod|Macintosh/i.test(ua);
      btn.setAttribute('href', isApple ? appleMapsUrl : googleMapsUrl);
      btn.setAttribute('target', '_blank');
      btn.setAttribute('rel', 'noopener noreferrer');
    })();
  </script>
</body>
</html>
